<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Los Simpson — TP III</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/css/style.css" />
  </head>
  <body>
    <nav
      class="navbar navbar-dark bg-warning-subtle border-bottom border-3 border-warning"
    >
      <div class="container">
        <main class="container py-4">
          <section class="mb-4">
            <div class="input-group">
              <input
                type="text"
                id="inputBuscador"
                class="form-control"
                placeholder="Buscar personaje por nombre..."
              />
              <button id="btnBuscar" class="btn btn-warning fw-bold">
                Buscar
              </button>
              <button id="btnLimpiar" class="btn btn-outline-secondary">
                Limpiar
              </button>
            </div>
            <div id="mensaje" class="mt-2 text-danger fw-semibold"></div>
          </section>

          <section id="contenedorTarjetas" class="row g-3"></section>
        </main>
        <span class="navbar-brand fw-bold text-dark">🍩 Los Simpson</span>
      </div>
    </nav>
    <div class="modal fade" id="modalDetalle" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content">
          <div class="modal-header bg-warning">
            <h5 class="modal-title fw-bold" id="modalTitulo">Detalle</h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
              aria-label="Cerrar"
            ></button>
          </div>
          <div class="modal-body" id="modalBody">
            <div class="text-center py-4">Cargando...</div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
