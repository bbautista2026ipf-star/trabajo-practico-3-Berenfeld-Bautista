<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Los Simpson — TP III</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/css/style.css" />
  </head>
  <body>
    <nav
      class="navbar navbar-dark bg-warning-subtle border-bottom border-3 border-warning"
    >
      <div class="container">
        <span class="navbar-brand fw-bold text-dark">🍩 Los Simpson</span>
      </div>
    </nav>

    <main class="container py-4">
      <section class="mb-4">
        <div class="input-group">
          <input
            type="text"
            id="inputBuscador"
            class="form-control"
            placeholder="Buscar personaje por nombre..."
          />
          <button id="btnBuscar" class="btn btn-warning fw-bold">Buscar</button>
          <button id="btnLimpiar" class="btn btn-outline-secondary">
            Limpiar
          </button>
        </div>
        <div id="mensaje" class="mt-2 text-danger fw-semibold"></div>
      </section>

      <section id="contenedorTarjetas" class="row g-3"></section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/app.js"></script>
  </body>
</html>
